name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  github-release:
    name: GitHub release + changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes (current tag only)
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Regenerate full CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Commit updated CHANGELOG.md back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- CHANGELOG.md; then
            git checkout main
            git pull --ff-only origin main
            git add CHANGELOG.md
            git commit -m "docs(changelog): update for ${GITHUB_REF_NAME}"
            git push origin main
          fi

  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tgtest/
    permissions:
      # OIDC token for PyPI Trusted Publishing (no API token in secrets).
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Verify tag matches project version
        run: |
          PROJECT_VERSION="$(poetry version --short)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "project=${PROJECT_VERSION} tag=${TAG_VERSION}"
          if [ "${PROJECT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match project version ${PROJECT_VERSION}"
            exit 1
          fi

      - name: Build distributions
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
